<!DOCTYPE html>
<html>
    <head>
        <title>CSS-Entra21</title>
    </head>
    <body>
        <header>
        <h1>
            <img src="https://cdn.sonicadigital.com.br/entra21/storage/settings/1/original-691cbe5cd50d1.png" height="60" alt="Entra21">
        </h1>
            <nav>
                <ul>
                <li>
                    <a href= "html.html">HTML</a>
                </li>
                <li>
                    <a href= "css.html">CSS</a>
                </li>
                <li>
                    <a href= "js.html">JS</a>
                </li>
                <li>
                    <a href="frontend_backend.html">Frontend X Backend</a>
                </li>
                </ul>
            </nav>
        </header>
        <main>
        <h2>Contato</h2>
            <p>Entre em contato com nosso time:</p>
            <form action="form.php" method="post">
                <div>
                    <label for="nome">Nome:</label>
                    <input type="text" name="nome" id="nome">
                </div>
                <div>
                    <label for="email">E-mail:</label>
                    <input type="email" name="email" id="email">
                </div>
                <div>
                    <label for="telefone">Telefone:</label>
                    <input type="text" name="telefone" id="telefone">
                </div>
                <div>
                    <label for="cidade">Cidade:</label>
                    <select id="cidade" name="cidade">
                        <option value>Selecione uma cidade</option>
                        <option value="brusque">Brusque</option>
                        <option value="gaspar">Gaspar</option>
                        <option value="indaial">Indaial</option>
                        <option value="itajai">Itajaí</option>
                        <option value="balneario_camboriu">Balneário Camboriu</option>
                        <option value="rio_do_sul">Rio do Sul</option>
                        <option value="timbo">Timbó</option>
                        <option value="blumenau">Blumenau</option>
                    </select>
                </div>
                <div>
                    <label>Tipo:</label>
                    <input type="radio" name="tipo" id="tipo_a">
                    <label for="tipo_a">Aluno</label>
                    <input type="radio" name="tipo" id="tipo_b">
                    <label for="tipo_b">Parceiro</label>
                </div>
                <div>
                    <label for="mensagem">Mensagem:</label>
                    <textarea name="mensagem" id="mensagem" rows="3"></textarea>
                </div>
                <div>
                    <input type="checkbox" name="termos" id="termos">
                    <label for="termos">Aceito os termos de uso</label>
                </div>
                <div>
                    <button type="submit">Enviar</button>
                </div>
            </form>
         </main>
    </body>
</html>
